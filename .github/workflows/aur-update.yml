name: AUR Update

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to deploy (e.g. v1.2.0)"
        required: true

jobs:
  update-aur:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pacman -Syu --noconfirm openssh git

      - name: Setup SSH
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p /root/.ssh
          chmod 700 /root/.ssh
          printf '%s' "$AUR_SSH_PRIVATE_KEY" | tr -d '\r' > /root/.ssh/aur
          chmod 600 /root/.ssh/aur
          ssh-keyscan -t rsa,ed25519 aur.archlinux.org > /root/.ssh/known_hosts
          chmod 644 /root/.ssh/known_hosts
          printf "Host aur.archlinux.org\n  IdentityFile /root/.ssh/aur\n  User aur\n  StrictHostKeyChecking yes\n  UserKnownHostsFile /root/.ssh/known_hosts\n" > /root/.ssh/config
          chmod 600 /root/.ssh/config

      - name: Update PKGBUILD version
        run: |
          VERSION="${{ github.ref_name || github.event.inputs.tag }}"
          VERSION="${VERSION#v}"
          sed -i "s/^pkgver=.*/pkgver=$VERSION/" PKGBUILD-stable
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD-stable

      - name: Clone AUR repo
        run: git clone ssh://aur@aur.archlinux.org/archvital.git /tmp/aur

      - name: Generate .SRCINFO and push
        run: |
          cp PKGBUILD-stable /tmp/aur/PKGBUILD
          cd /tmp/aur
          makepkg --printsrcinfo > .SRCINFO
          git config user.name "T9Tuco"
          git config user.email "tucot9@tuta.io"
          git add PKGBUILD .SRCINFO
          git commit -m "update to ${{ github.ref_name }}"
          git push
