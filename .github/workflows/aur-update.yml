name: AUR Update

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to deploy (e.g. v1.2.0)"
        required: true

jobs:
  update-aur:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pacman -Syu --noconfirm openssh git

      - name: Setup SSH
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p /root/.ssh
          chmod 700 /root/.ssh
          ssh-keyscan -t rsa,ed25519 aur.archlinux.org > /root/.ssh/known_hosts
          eval "$(ssh-agent -s)"
          echo "$AUR_SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> $GITHUB_ENV
          printf "Host aur.archlinux.org\n  User aur\n  StrictHostKeyChecking yes\n  UserKnownHostsFile /root/.ssh/known_hosts\n" > /root/.ssh/config

      - name: Update PKGBUILD version
        run: |
          VERSION="${{ github.ref_name || github.event.inputs.tag }}"
          VERSION="${VERSION#v}"
          sed -i "s/^pkgver=.*/pkgver=$VERSION/" PKGBUILD-stable
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD-stable

      - name: Clone AUR repo
        run: git clone ssh://aur@aur.archlinux.org/archvital.git /tmp/aur

      - name: Generate .SRCINFO and push
        run: |
          cp PKGBUILD-stable /tmp/aur/PKGBUILD
          useradd -m builder
          chown -R builder:builder /tmp/aur
          su builder -c "cd /tmp/aur && makepkg --printsrcinfo" > /tmp/aur/.SRCINFO
          cd /tmp/aur
          git config user.name "T9Tuco"
          git config user.email "tucot9@tuta.io"
          git add PKGBUILD .SRCINFO
          git commit -m "update to ${{ github.ref_name || github.event.inputs.tag }}"
          git push
