name: AUR Update

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to deploy (e.g. v1.2.0)"
        required: true

jobs:
  update-aur:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pacman -Syu --noconfirm openssh git

      - name: Setup SSH
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p /root/.ssh
          chmod 700 /root/.ssh
          ssh-keyscan -t rsa,ed25519 aur.archlinux.org > /root/.ssh/known_hosts
          eval "$(ssh-agent -s)"
          echo "$AUR_SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> $GITHUB_ENV
          printf "Host aur.archlinux.org\n  User aur\n  StrictHostKeyChecking yes\n  UserKnownHostsFile /root/.ssh/known_hosts\n" > /root/.ssh/config

      - name: Update PKGBUILD version
        run: |
          VERSION="${{ github.ref_name || github.event.inputs.tag }}"
          VERSION="${VERSION#v}"
          sed -i "s/^pkgver=.*/pkgver=$VERSION/" PKGBUILD-stable
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD-stable

      - name: Clone AUR repos
        run: |
          git clone ssh://aur@aur.archlinux.org/archvital.git /tmp/aur-stable
          git clone ssh://aur@aur.archlinux.org/archvital-git.git /tmp/aur-git

      - name: Update archvital (stable)
        run: |
          cp PKGBUILD-stable /tmp/aur-stable/PKGBUILD
          useradd -m builder
          chown -R builder:builder /tmp/aur-stable /tmp/aur-git
          su builder -c "cd /tmp/aur-stable && makepkg --printsrcinfo" > /tmp/aur-stable/.SRCINFO
          git config --global --add safe.directory /tmp/aur-stable
          git -C /tmp/aur-stable config user.name "T9Tuco"
          git -C /tmp/aur-stable config user.email "tucot9@tuta.io"
          git -C /tmp/aur-stable add PKGBUILD .SRCINFO
          git -C /tmp/aur-stable diff --cached --quiet || git -C /tmp/aur-stable commit -m "update to ${{ github.ref_name || github.event.inputs.tag }}"
          git -C /tmp/aur-stable push || true

      - name: Update archvital-git
        run: |
          cp PKGBUILD /tmp/aur-git/PKGBUILD
          su builder -c "cd /tmp/aur-git && makepkg --printsrcinfo" > /tmp/aur-git/.SRCINFO
          git config --global --add safe.directory /tmp/aur-git
          git -C /tmp/aur-git config user.name "T9Tuco"
          git -C /tmp/aur-git config user.email "tucot9@tuta.io"
          git -C /tmp/aur-git add PKGBUILD .SRCINFO
          git -C /tmp/aur-git diff --cached --quiet || git -C /tmp/aur-git commit -m "update to ${{ github.ref_name || github.event.inputs.tag }}"
          git -C /tmp/aur-git push || true
